name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            sha-${{ github.sha }}
            ${{ github.ref_name }}-${{ github.run_number }}
            latest
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx@v3

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Deploy to Render via API
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_SERVICE_ID" ] || [ -z "$RENDER_API_KEY" ]; then
            echo "⚠️ Secrets RENDER_SERVICE_ID o RENDER_API_KEY no configurados."
            echo "   Configuralos en: GitHub → Settings → Secrets and variables → Actions"
            echo "   (La imagen ya se subió a GHCR — hacé un deploy manual en Render)"
            exit 0
          fi

          DIGEST="${{ steps.build-and-push.outputs.digest }}"
          IMAGE_URL="ghcr.io/${{ env.IMAGE_NAME }}@$DIGEST"
          echo "📦 Image URL: $IMAGE_URL"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${REND...Y}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${IMAGE_URL}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "📡 Render response (HTTP $HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Deploy triggered! URL: https://dashboard.render.com/web/srv-$(echo $RENDER_SERVICE_ID | cut -d- -f2)/deploys"
          elif [ "$HTTP_CODE" -eq 409 ]; then
            echo "⚠️ Ya hay un deploy en curso. Esperá y revisá el dashboard."
          elif [ "$HTTP_CODE" -eq 400 ]; then
            echo "❌ El servicio no acepta imageUrl. Hay que recrearlo en Render como Web Service con Image URL."
            echo "   Dashboard → New → Web Service → elegir 'Image URL' → pegar ghcr.io/Nazacarames/agency-agents:latest"
            echo "   Luego configurar las mismas env vars (MINIMAX_API_KEY, DISCORD_WEBHOOK_URL, etc.)"
            exit 1
          else
            echo "❌ Deploy trigger falló (HTTP $HTTP_CODE)"
            exit 1
          fi