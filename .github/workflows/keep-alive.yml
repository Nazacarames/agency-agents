name: Keep Render Service Alive

# Ping /healthz cada 5 min para que Render Free no hiberne.
# Solo actua si el secret RENDER_SERVICE_URL esta configurado en GitHub
# (Settings -> Secrets and variables -> Actions -> Variables).

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:                       # trigger manual desde GitHub UI

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping healthz
        if: env.RENDER_SERVICE_URL != ''
        env:
          RENDER_SERVICE_URL: ${{ vars.RENDER_SERVICE_URL }}
        run: |
          URL="${RENDER_SERVICE_URL%/}/healthz"
          echo "Pinging $URL ..."
          HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/health.json | head -3
          echo ""
          if [ "$HTTP_CODE" = "200" ]; then
            echo "OK - service is alive"
          else
            echo "WARN - service returned $HTTP_CODE, may be hibernating or starting up"
            # No fallar: el primer ping despues de hibernar puede tardar 30s+
          fi
